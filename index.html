<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxdX | Official Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;900&display=swap');
        body { background-color: #0b0f1a; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        #lang-overlay { position: fixed; inset: 0; background: rgba(11, 15, 26, 0.5); backdrop-filter: blur(40px); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .lang-card { background: rgba(15, 23, 42, 0.95); border: 2px solid #00d2ff; padding: 40px; border-radius: 40px; text-align: center; width: 90%; max-width: 400px; }
        .sidebar { position: fixed; left: 0; top: 80px; bottom: 0; width: 80px; border-right: 1px solid rgba(0,210,255,0.2); display: flex; flex-direction: column; align-items: center; gap: 10px; padding-top: 20px; background: #0b0f1a; z-index: 100; }
        .nav-item { width: 75px; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; text-decoration: none; text-align: center; transition: 0.2s; }
        .nav-item.active, .nav-item:hover { color: #00d2ff; }
        .nav-emoji { font-size: 24px; line-height: 1; margin-bottom: 2px; }
        .nav-text { font-size: 8px; font-weight: bold; text-transform: lowercase; }
        .header-line { border-bottom: 2px solid #00d2ff; }
        footer { border-top: 1px solid rgba(0,210,255,0.1); padding: 40px; text-align: center; margin-left: 80px; }
        .foot-link { color: #475569; text-decoration: none; font-size: 11px; margin: 0 10px; font-weight: bold; }
        .news-card { background: rgba(30, 41, 59, 0.4); border-radius: 25px; border: 1px solid rgba(0,210,255,0.1); overflow: hidden; }
    </style>
</head>
<body>
    <div id="lang-overlay">
        <div class="lang-card">
            <h2 class="text-xl font-black mb-8 title-font text-sky-400 italic uppercase">Select Language</h2>
            <div class="flex flex-col gap-4">
                <button onclick="confirmLang('en')" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl hover:border-sky-400 font-bold flex items-center justify-center gap-3 transition text-lg">🇺🇸 English</button>
                <button onclick="confirmLang('ru')" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl hover:border-sky-400 font-bold flex items-center justify-center gap-3 transition text-lg">🇷🇺 Русский</button>
                <button onclick="confirmLang('ua')" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl hover:border-sky-400 font-bold flex items-center justify-center gap-3 transition text-lg">🇺🇦 Українська</button>
            </div>
        </div>
    </div>
    <header class="h-[80px] header-line px-8 flex items-center justify-between sticky top-0 bg-[#0b0f1a] z-[110]">
        <div class="text-3xl font-black title-font italic uppercase tracking-tighter">BLOXD<span class="text-sky-400">X</span></div>
        <button onclick="showLangSelect()" id="current-lang-icon" class="text-2xl bg-white/5 w-12 h-12 rounded-2xl border border-white/10 flex items-center justify-center">🌐</button>
    </header>
    <nav class="sidebar">
        <a href="index.html" class="nav-item active"><span class="nav-emoji">🏠</span><span class="nav-text" id="nav-home">home</span></a>
        <a href="news.html" class="nav-item"><span class="nav-emoji">🌍</span><span class="nav-text" id="nav-news">news</span></a>
        <a href="builds.html" class="nav-item"><span class="nav-emoji">🏗</span><span class="nav-text" id="nav-builds">builds</span></a>
        <a href="worlds.html" class="nav-item"><span class="nav-emoji">✨</span><span class="nav-text" id="nav-worlds">worlds</span></a>
        <a href="mods.html" class="nav-item"><span class="nav-emoji">🧩</span><span class="nav-text" id="nav-mods">mods</span></a>
        <a href="partners.html" class="nav-item"><span class="nav-emoji">🤝</span><span class="nav-text" id="nav-partners">partners</span></a>
        <a href="championships.html" class="nav-item"><span class="nav-emoji">🏆</span><span class="nav-text" id="nav-champs">championships</span></a>
    </nav><main class="ml-[80px] p-8">
        <div class="py-12">
            <h1 class="text-6xl md:text-8xl font-black title-font mb-1 italic uppercase leading-none tracking-tighter">BLOXD<span class="text-sky-400">X</span></h1>
            <p class="text-sky-400 font-bold tracking-[0.2em] text-[11px] uppercase opacity-80 italic">sng community universe</p>
        </div>
        <div class="max-w-6xl">
            <h2 id="recent-title" class="text-2xl font-black uppercase border-l-4 border-sky-500 pl-4 tracking-tight mb-8">Свежие новости</h2>
            <div id="latest-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="text-gray-700 animate-pulse font-bold text-xs uppercase">Синхронизация...</div>
            </div>
        </div>
    </main>
    <footer>
        <div class="flex justify-center gap-8 mb-6">
            <a href="https://t.me/Dzazcc" target="_blank" class="foot-link" id="foot-collab">Сотрудничество</a>
            <a href="https://t.me/Dzazcc" target="_blank" class="foot-link" id="foot-contact">Связаться с нами</a>
        </div>
        <p class="text-[9px] uppercase tracking-[0.3em] opacity-20">© 2024 BloxdX Portal. All rights reserved.</p>
    </footer>
    <script>
        const langConfigs = {
            ru: { recent: "Свежие новости", collab: "Сотрудничество", contact: "Связаться с нами", flag: "🇷🇺", home: "главная", news: "новости", builds: "постройки", worlds: "миры", mods: "моды", partners: "партнёры", champs: "чемпионаты" },
            ua: { recent: "Останні новини", collab: "Співпраця", contact: "Зв'язатися з нами", flag: "🇺🇦", home: "головна", news: "новини", builds: "будови", worlds: "світи", mods: "моди", partners: "партнери", champs: "чемпіонати" },
            en: { recent: "Latest News", collab: "Collaboration", contact: "Contact Us", flag: "🇺🇸", home: "home", news: "news", builds: "builds", worlds: "worlds", mods: "mods", partners: "partners", champs: "champs" }
        };
        function confirmLang(lang) {
            localStorage.setItem('selectedLang', lang);
            document.getElementById('lang-overlay').style.display = 'none';
            applyLang(lang);
        }
        function showLangSelect() { document.getElementById('lang-overlay').style.display = 'flex'; }
        function applyLang(lang) {
            const cfg = langConfigs[lang] || langConfigs.en;
            document.getElementById('recent-title').innerText = cfg.recent;
            document.getElementById('foot-collab').innerText = cfg.collab;
            document.getElementById('foot-contact').innerText = cfg.contact;
            document.getElementById('current-lang-icon').innerText = cfg.flag;
            document.getElementById('nav-home').innerText = cfg.home;
            document.getElementById('nav-news').innerText = cfg.news;
            document.getElementById('nav-builds').innerText = cfg.builds;
            document.getElementById('nav-worlds').innerText = cfg.worlds;
            document.getElementById('nav-mods').innerText = cfg.mods;
            document.getElementById('nav-partners').innerText = cfg.partners;
            document.getElementById('nav-champs').innerText = cfg.champs;
        }
        const savedLang = localStorage.getItem('selectedLang');
        if (savedLang) { document.getElementById('lang-overlay').style.display = 'none'; applyLang(savedLang); }
        async function loadAllPosts() {
            const cats = ['news', 'builds', 'worlds', 'mods', 'partners', 'champs'];
            const container = document.getElementById('latest-container');
            let all = [];
            for (const cat of cats) {
                try {
                    const res = await fetch(`https://api.github.com/repos/ket20091976-maker/titanx-bloxd-sng/contents/_posts/${cat}`);
                    const files = await res.json();
                    if (Array.isArray(files)) {
                        for (const f of files) {
                            const pRes = await fetch(f.download_url);
                            const txt = await pRes.text();
                            const meta = txt.split('---')[1];
                            const title = meta.match(/title:\s*(.*)/)[1].replace(/"/g, '');
                            const img = meta.match(/image:\s*(.*)/)?.[1].replace(/"/g, '').trim();
                            all.push({ title, img, date: f.name });
                        }
                    }
                } catch (e) {}
            }
            all.sort((a, b) => b.date.localeCompare(a.date));
            const top3 = all.slice(0, 3);
            if (top3.length === 0) { container.innerHTML = '<div class="text-gray-700 text-sm italic col-span-full text-center">Нет новых публикаций.</div>'; return; }
            container.innerHTML = top3.map(p => `
                <div class="news-card">
                    ${p.img ? `<img src="${p.img}" class="w-full h-48 object-cover opacity-80">` : '<div class="h-48 bg-slate-900/50 flex items-center justify-center text-[10px] text-gray-800 font-bold tracking-widest uppercase italic">No Media</div>'}
                    <div class="p-6">
                        <div class="w-8 h-1 bg-sky-500 mb-4 opacity-40"></div>
                        <h3 class="font-black text-sm uppercase leading-tight tracking-tight">${p.title}</h3>
                    </div>
                </div>
            `).join('');
        }
        loadAllPosts();
    </script>
</body>
</html>
