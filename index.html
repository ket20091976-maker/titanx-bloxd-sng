    <script>
        const langData = {
            ru: { flag: 'ru', code: 'RU', recent: "Свежие новости", home: "главная", gnews: "новости игры", news: "новости сервера", builds: "постройки", worlds: "интересные миры", mods: "наши моды", partners: "партнёры", champs: "чемпионаты", empty: "Пока нет новостей" },
            ua: { flag: 'ua', code: 'UA', recent: "Останні новини", home: "головна", gnews: "новини гри", news: "новини сервера", builds: "будови", worlds: "цікаві світи", mods: "наші моди", partners: "партнери", champs: "чемпіонати", empty: "Поки немає новин" },
            en: { flag: 'us', code: 'EN', recent: "Latest News", home: "home", gnews: "game news", news: "server news", builds: "builds", worlds: "cool worlds", mods: "our mods", partners: "partners", champs: "champs", empty: "No news yet" }
        };

        let allPosts = [];

        function confirmLang(lang) {
            localStorage.setItem('selectedLang', lang);
            document.getElementById('lang-overlay').style.display = 'none';
            applyLang(lang);
            renderPosts();
        }

        function showLangSelect() { document.getElementById('lang-overlay').style.display = 'flex'; }
        
        function applyLang(lang) {
            const c = langData[lang] || langData.en;
            document.getElementById('current-flag').src = `https://flagcdn.com/w40/${c.flag}.png`;
            document.getElementById('current-lang-code').innerText = c.code;
            document.getElementById('recent-title').innerText = c.recent;
            ['home', 'gnews', 'news', 'builds', 'worlds', 'mods', 'partners', 'champs'].forEach(id => {
                const el = document.getElementById('nav-' + id);
                if(el) el.innerText = c[id];
            });
        }

        async function loadAllFeeds() {
            const cats = ['game_news', 'news', 'builds', 'worlds', 'mods', 'partners', 'championships'];
            allPosts = [];
            for(const cat of cats) {
                try {
                    const res = await fetch(`https://api.github.com/repos/ket20091976-maker/titanx-bloxd-sng/contents/_posts/${cat}`);
                    const files = await res.json();
                    if(Array.isArray(files)) {
                        for(const f of files) {
                            if(!f.name.endsWith('.md')) continue;
                            const pRes = await fetch(f.download_url);
                            const txt = await pRes.text();
                            const metaArr = txt.split('---');
                            if(metaArr.length < 2) continue;
                            const meta = metaArr[1];
                            const getMeta = (key) => {
                                const rgx = new RegExp(`${key}:\\s*(.*)`);
                                const match = meta.match(rgx);
                                return match ? match[1].replace(/"/g, '').trim() : null;
                            };
                            allPosts.push({
                                title_ru: getMeta('title_ru'),
                                title_ua: getMeta('title_ua'),
                                title_en: getMeta('title_en'),
                                image: getMeta('image'),
                                date: f.name,
                                id: f.name.replace('.md', '')
                            });
