<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxdX | Official Portal</title>
    <!-- Скрипт для админки (Identity) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0b0f1a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .sidebar { position: fixed; left: 0; top: 80px; bottom: 0; width: 70px; border-right: 2px solid #00d2ff; display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 25px; z-index: 100; background: #0b0f1a; }
        .nav-item { position: relative; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.03); border-radius: 12px; transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .nav-emoji { font-size: 20px; filter: grayscale(100%); opacity: 0.5; transition: 0.3s; }
        .nav-item:hover { background: rgba(0, 210, 255, 0.15); border-color: #00d2ff; width: 170px; justify-content: flex-start; padding-left: 15px; }
        .nav-item:hover .nav-emoji { filter: grayscale(0%); opacity: 1; }
        .nav-text { position: absolute; left: 55px; opacity: 0; white-space: nowrap; transition: 0.3s; font-weight: 800; text-transform: uppercase; font-size: 13px; color: #00d2ff; }
        .nav-item:hover .nav-text { opacity: 1; }
        .lang-btn { padding: 4px 10px; cursor: pointer; border-radius: 5px; font-size: 12px; font-weight: 900; transition: 0.3s; color: #555; }
        .lang-btn.active { background: #00d2ff; color: #0b0f1a; }
        .social-sidebar { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .social-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: 0.3s; opacity: 0.7; }
        .social-icon:hover { transform: scale(1.1); opacity: 1; }
    </style>
</head>
<body>
    <header class="h-[80px] border-b-2 border-[#00d2ff] relative px-8 flex items-center justify-between">
        <div class="text-3xl font-black title-font tracking-tighter uppercase italic">BLOXD<span class="text-sky-400">X</span></div>
        <div class="flex gap-2 bg-white/5 p-1 rounded-lg">
            <div onclick="setLang('ru')" id="btn-ru" class="lang-btn">RU</div>
            <div onclick="setLang('ua')" id="btn-ua" class="lang-btn">UA</div>
        </div>
    </header>

    <nav class="sidebar">
        <a href="index.html" class="nav-item" style="border-color: #00d2ff; background: rgba(0, 210, 255, 0.1);"><span class="nav-emoji">🏠</span><span class="nav-text" id="nav-home">Главная</span></a>
        <a href="news.html" class="nav-item"><span class="nav-emoji">📄</span><span class="nav-text" id="nav-news">Новости</span></a>
        <a href="championships.html" class="nav-item"><span class="nav-emoji">🏆</span><span class="nav-text" id="nav-champs">Чемпионаты</span></a>
    </nav>

    <div class="social-sidebar">
        <a href="https://t.me/bloxdioSNGRU" target="_blank" class="social-icon bg-[#0088cc]"><i class="fab fa-telegram-plane text-white"></i></a>
        <a href="https://discord.gg/sbnTQP4M4" target="_blank" class="social-icon bg-[#5865F2]"><i class="fab fa-discord text-white"></i></a>
    </div>

    <main class="ml-[70px] pt-32 text-center px-6">
        <h1 class="text-7xl md:text-9xl font-black title-font mb-6 tracking-tighter italic uppercase">BLOXD<span class="text-sky-400">X</span></h1>
        <p class="text-gray-400 text-xl max-w-2xl mx-auto mb-12" id="hero-desc">Будущее Bloxd.io начинается здесь.</p>
        <div class="bg-slate-900/90 backdrop-blur-xl px-8 py-5 rounded-2xl border border-sky-400/30 inline-flex items-center gap-6 shadow-2xl">
            <code class="text-sky-400 font-bold text-xl tracking-widest">lobby.bloxd.io (BloxdX)</code>
            <button onclick="copyIp()" class="bg-sky-500 text-white w-12 h-12 rounded-xl hover:scale-110 transition"><i class="fa-regular fa-copy"></i></button>
        </div>
    </main>

    <script>
        const langData = {
            ru: { navHome: "Главная", navNews: "Новости", navChamps: "Чемпионаты", heroDesc: "Добро пожаловать в элитное сообщество BloxdX.", copyMsg: "Скопировано!" },
            ua: { navHome: "Головна", navNews: "Новини", navChamps: "Чемпіонати", heroDesc: "Ласкаво просимо до елітної спільноти BloxdX.", copyMsg: "Скопійовано!" }
        };
        function setLang(lang) {
            localStorage.setItem('selectedLang', lang);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            document.getElementById('nav-home').innerText = langData[lang].navHome;
            document.getElementById('nav-news').innerText = langData[lang].navNews;
            document.getElementById('nav-champs').innerText = langData[lang].navChamps;
            document.getElementById('hero-desc').innerText = langData[lang].heroDesc;
        }
        setLang(localStorage.getItem('selectedLang') || 'ru');
        function copyIp() {
            navigator.clipboard.writeText("lobby.bloxd.io (BloxdX)");
            alert(langData[localStorage.getItem('selectedLang') || 'ru'].copyMsg);
        }

        // Логика перенаправления после входа в админку
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
