<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости сервера | BloxdX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0b0f1a; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .line-blue { border-bottom: 2px solid #00d2ff; }
        
        /* Окно выбора языка */
        #lang-overlay { position: fixed; inset: 0; background: rgba(11, 15, 26, 0.95); backdrop-filter: blur(25px); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .lang-card { background: #161e2d; border: 2px solid #00d2ff; padding: 40px; border-radius: 30px; text-align: center; width: 90%; max-width: 400px; }
        
        /* Меню слева - Четкие буквы */
        .sidebar { position: fixed; left: 0; top: 80px; bottom: 0; width: 95px; border-right: 1px solid rgba(0,210,255,0.3); display: flex; flex-direction: column; align-items: center; gap: 5px; padding-top: 15px; background: #0b0f1a; z-index: 100; overflow-y: auto; }
        .nav-item { width: 85px; min-height: 75px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ffffff; text-decoration: none; transition: 0.2s; text-align: center; border-radius: 12px; }
        .nav-item.active, .nav-item:hover { color: #00d2ff; background: rgba(0, 210, 255, 0.1); }
        .nav-emoji { font-size: 26px; line-height: 1; margin-bottom: 4px; }
        .nav-text { font-size: 9px; font-weight: 900; text-transform: uppercase; line-height: 1.1; color: inherit; }

        .flag-icon { width: 24px; height: 16px; object-fit: cover; border-radius: 2px; }
        .news-card { background: rgba(30, 41, 59, 0.5); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px; text-align: center; margin-left: 95px; }
    </style>
</head>
<body>
    <!-- Окно выбора языка -->
    <div id="lang-overlay">
        <div class="lang-card">
            <h2 class="text-xl font-black mb-8 title-font text-sky-400 uppercase italic">Select Language</h2>
            <div class="flex flex-col gap-4">
                <button onclick="confirmLang('en')" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl hover:border-sky-400 font-black flex items-center justify-center gap-4 transition"><img src="https://flagcdn.com/w40/us.png" class="flag-icon"> ENGLISH</button>
                <button onclick="confirmLang('ru')" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl hover:border-sky-400 font-black flex items-center justify-center gap-4 transition"><img src="https://flagcdn.com/w40/ru.png" class="flag-icon"> РУССКИЙ</button>
                <button onclick="confirmLang('ua')" class="bg-slate-800 border border-slate-700 p-4 rounded-2xl hover:border-sky-400 font-black flex items-center justify-center gap-4 transition"><img src="https://flagcdn.com/w40/ua.png" class="flag-icon"> УКРАЇНСЬКА</button>
            </div>
        </div>
    </div>

    <header class="h-[80px] line-blue px-8 flex items-center justify-between sticky top-0 bg-[#0b0f1a] z-[110]">
        <div>
            <div class="text-3xl font-black title-font italic uppercase tracking-tighter">BLOXD<span class="text-sky-400">X</span></div>
            <div class="text-[11px] font-black text-sky-400 uppercase tracking-[0.15em] mt-[-3px]">sng community universe</div>
        </div>
        <button onclick="showLangSelect()" class="bg-white/5 px-4 py-2 rounded-xl border border-white/10 flex items-center gap-3 hover:border-sky-400 transition">
            <img id="current-flag" src="https://flagcdn.com/w40/ru.png" class="flag-icon">
            <span id="current-lang-code" class="text-sm font-black text-white">RU</span>
        </button>
    </header>

    <nav class="sidebar">
        <a href="index.html" class="nav-item"><span class="nav-emoji">🏠</span><span class="nav-text" id="nav-home">главная</span></a>
        <a href="game-news.html" class="nav-item"><span class="nav-emoji">🗞</span><span class="nav-text" id="nav-gnews">новости игры</span></a>
        <a href="news.html" class="nav-item active"><span class="nav-emoji">🌍</span><span class="nav-text" id="nav-news">новости сервера</span></a>
        <a href="builds.html" class="nav-item"><span class="nav-emoji">🏗</span><span class="nav-text" id="nav-builds">постройки</span></a>
        <a href="worlds.html" class="nav-item"><span class="nav-emoji">✨</span><span class="nav-text" id="nav-worlds">интересные миры</span></a>
        <a href="mods.html" class="nav-item"><span class="nav-emoji">🧩</span><span class="nav-text" id="nav-mods">наши моды</span></a>
        <a href="partners.html" class="nav-item"><span class="nav-emoji">🤝</span><span class="nav-text" id="nav-partners">партнёры</span></a>
        <a href="championships.html" class="nav-item"><span class="nav-emoji">🏆</span><span class="nav-text" id="nav-champs">чемпионаты</span></a>
    </nav>

    <main class="ml-[95px] p-8">
        <h2 id="page-title" class="text-3xl font-black uppercase border-l-8 border-sky-500 pl-6 mb-12 text-white italic">Новости сервера</h2>
        <div id="content-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Сюда подгрузятся новости -->
        </div>
    </main>

    <footer>
        <div class="flex justify-center gap-12 mb-6">
            <a href="https://t.me/Dzazcc" target="_blank" class="text-[12px] font-black text-sky-400 hover:text-white uppercase tracking-widest transition" id="foot-collab">Сотрудничество</a>
            <a href="https://t.me/Dzazcc" target="_blank" class="text-[12px] font-black text-sky-400 hover:text-white uppercase tracking-widest transition" id="foot-contact">Связаться с нами</a>
        </div>
        <p class="text-[10px] text-gray-600 font-bold uppercase opacity-40">© 2024 BloxdX Official. All rights reserved.</p>
    </footer>

    <script>
        const langData = {
            ru: { flag: 'ru', code: 'RU', title: "Новости сервера", collab: "Сотрудничество", contact: "Связаться с нами", home: "главная", gnews: "новости игры", news: "новости сервера", builds: "постройки", worlds: "интересные миры", mods: "наши моды", partners: "партнёры", champs: "чемпионаты" },
            ua: { flag: 'ua', code: 'UA', title: "Новини сервера", collab: "Співпраця", contact: "Зв'язатися з нами", home: "головна", gnews: "новини гри", news: "новини сервера", builds: "будови", worlds: "цікаві світи", mods: "наші моди", partners: "партнери", champs: "чемпіонати" },
            en: { flag: 'us', code: 'EN', title: "Server News", collab: "Collaboration", contact: "Contact Us", home: "home", gnews: "game news", news: "server news", builds: "builds", worlds: "cool worlds", mods: "our mods", partners: "partners", champs: "champs" }
        };

        function confirmLang(l){ localStorage.setItem('selectedLang', l); location.reload(); }
        function showLangSelect(){ document.getElementById('lang-overlay').style.display='flex'; }

        const savedLang = localStorage.getItem('selectedLang') || 'ru';
        const c = langData[savedLang];

        document.getElementById('current-flag').src = `https://flagcdn.com/w40/${c.flag}.png`;
        document.getElementById('current-lang-code').innerText = c.code;
        document.getElementById('page-title').innerText = c.title;
        document.getElementById('foot-collab').innerText = c.collab;
        document.getElementById('foot-contact').innerText = c.contact;
        ['home','gnews','news','builds','worlds','mods','partners','champs'].forEach(id => {
            document.getElementById('nav-'+id).innerText = c[id];
        });

        async function loadServerNews() {
            const container = document.getElementById('content-container');
            try {
                const res = await fetch(`https://api.github.com/repos/ket20091976-maker/titanx-bloxd-sng/contents/_posts/news`);
                const files = await res.json();
                if(!Array.isArray(files)) { container.innerHTML = '<div class="text-gray-600 font-bold uppercase italic">Пусто...</div>'; return; }
                
                let html = '';
                for(const f of files.reverse()) {
                    if(!f.name.endsWith('.md')) continue;
                    const pRes = await fetch(f.download_url);
                    const txt = await pRes.text();
                    const meta = txt.split('---')[1];
                    const body = txt.split('---')[2] || "";
                    const title = meta.match(/title:\s*(.*)/)[1].replace(/"/g, '');
                    const img = meta.match(/image:\s*(.*)/)?.[1].replace(/"/g, '').trim();
                    
                    html += `<div class="news-card">
                        ${img ? `<img src="${img}" class="w-full h-56 object-cover">` : '<div class="h-56 bg-slate-900/50 flex items-center justify-center font-black text-gray-800 uppercase italic">No image</div>'}
                        <div class="p-8">
                            <div class="w-12 h-1 bg-sky-500 mb-6 opacity-50"></div>
                            <h3 class="font-black text-lg uppercase leading-tight text-white mb-4">${title}</h3>
                            <div class="text-gray-400 text-sm line-clamp-3">${body.substring(0, 150)}...</div>
                        </div>
                    </div>`;
                }
                container.innerHTML = html;
            } catch(e) { container.innerHTML = '<div class="text-gray-600 font-bold italic uppercase">Загрузка...</div>'; }
        }
        loadServerNews();
    </script>
</body>
</html>
